<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戴阅的火影世界 — 忍者卡牌图鉴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC',sans-serif;background:#080c18;color:#c8d6e5;overflow-x:hidden;min-height:100vh}
:root{
  --bg:#080c18;--navy:#0d1225;--slate:#151b30;--card-bg:#111830;
  --silver:#8e99a9;--light:#c8d6e5;--white:#eef2f7;
  --cyan:#4ecdc4;--cyan-glow:rgba(78,205,196,0.35);
  --red:#e74c3c;--orange:#f39c12;--purple:#8e44ad;--gold:#ffd700;
  --blue:#00a8ff;--green:#2ecc71;--pink:#e91e8c;
}
/* ===== NAV ===== */
nav{position:fixed;top:0;left:0;right:0;z-index:999;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;background:rgba(8,12,24,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(78,205,196,0.1)}
.nav-logo{display:flex;align-items:center;gap:8px}
.nav-logo img{height:24px;filter:brightness(0) invert(0.6) sepia(1) saturate(3) hue-rotate(135deg)}
.nav-logo span{font-family:'Orbitron',sans-serif;font-weight:900;font-size:.9rem;color:var(--cyan);text-shadow:0 0 10px var(--cyan-glow);letter-spacing:2px}
.nav-links{display:flex;gap:20px;list-style:none}
.nav-links a{color:var(--silver);text-decoration:none;font-size:.8rem;font-weight:700;letter-spacing:1px;transition:.3s}
.nav-links a:hover{color:var(--cyan)}
/* ===== HERO ===== */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 20px 40px;position:relative;overflow:hidden;background:radial-gradient(ellipse at 50% 80%,rgba(78,205,196,0.06) 0%,transparent 60%),var(--bg)}
.hero-chars{display:flex;align-items:flex-end;justify-content:center;gap:0;margin-bottom:20px;position:relative}
.hero-char{transition:.3s;filter:drop-shadow(0 0 20px rgba(0,0,0,0.8))}
.hero-char:nth-child(1){width:160px;transform:translateX(30px);z-index:1;opacity:.8}
.hero-char:nth-child(2){width:240px;z-index:3;animation:hero-float 3s ease-in-out infinite}
.hero-char:nth-child(3){width:160px;transform:translateX(-30px);z-index:1;opacity:.8}
@keyframes hero-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hero-badge{display:inline-block;padding:6px 20px;border:1px solid var(--cyan);border-radius:20px;font-size:.7rem;color:var(--cyan);letter-spacing:4px;text-transform:uppercase;margin-bottom:16px;opacity:0;animation:fadeUp .8s .3s forwards}
.hero h1{font-family:'Orbitron',sans-serif;font-size:clamp(2rem,7vw,4.5rem);font-weight:900;color:var(--white);text-shadow:0 0 30px var(--cyan-glow);line-height:1.1;opacity:0;animation:fadeUp .8s .5s forwards}
.hero h2{font-size:clamp(1.2rem,4vw,2rem);font-weight:900;color:var(--cyan);margin-top:8px;opacity:0;animation:fadeUp .8s .7s forwards}
.hero-stats{display:flex;gap:40px;margin-top:30px;opacity:0;animation:fadeUp .8s .9s forwards}
.hero-stat{text-align:center}
.hero-stat-val{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;color:var(--cyan)}
.hero-stat-label{font-size:.7rem;color:var(--silver);letter-spacing:2px;text-transform:uppercase}
.scroll-down{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);opacity:0;animation:fadeUp 1s 1.5s forwards}
.scroll-down span{font-size:.7rem;color:var(--silver);letter-spacing:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
/* ===== SECTION ===== */
section{padding:80px 20px;max-width:1200px;margin:0 auto}
.section-header{text-align:center;margin-bottom:50px}
.section-tag{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:6px;color:var(--cyan);text-transform:uppercase;margin-bottom:6px;opacity:.7}
.section-title{font-size:clamp(1.6rem,4vw,2.5rem);font-weight:900;color:var(--white);text-shadow:0 0 15px var(--cyan-glow)}
/* ===== CARD GRID ===== */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.ninja-card{background:var(--card-bg);border:2px solid rgba(78,205,196,0.12);border-radius:16px;overflow:hidden;cursor:pointer;transition:.3s;position:relative}
.ninja-card:hover{border-color:var(--cyan);transform:translateY(-6px);box-shadow:0 12px 40px rgba(78,205,196,0.15)}
.ninja-card.rarity-s{border-color:rgba(255,215,0,0.3)}
.ninja-card.rarity-s:hover{border-color:var(--gold);box-shadow:0 12px 40px rgba(255,215,0,0.15)}
.ninja-card.rarity-a{border-color:rgba(142,68,173,0.3)}
.ninja-card.rarity-a:hover{border-color:var(--purple);box-shadow:0 12px 40px rgba(142,68,173,0.15)}
.card-rarity{position:absolute;top:12px;right:12px;padding:3px 10px;border-radius:4px;font-family:'Orbitron',sans-serif;font-size:.6rem;font-weight:900;letter-spacing:1px;z-index:2}
.rarity-s .card-rarity{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#1a1a2e}
.rarity-a .card-rarity{background:var(--purple);color:#fff}
.rarity-b .card-rarity{background:var(--cyan);color:#0a0e1a}
.card-img-wrap{height:200px;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(180deg,rgba(78,205,196,0.04),transparent)}
.card-img-wrap img{max-height:100%;max-width:100%;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.6));transition:.3s}
.ninja-card:hover .card-img-wrap img{transform:scale(1.08)}
.card-body{padding:16px}
.card-name{font-size:1.1rem;font-weight:900;color:var(--white);margin-bottom:2px}
.card-name-jp{font-size:.7rem;color:var(--silver);margin-bottom:10px}
.card-stats{display:flex;flex-direction:column;gap:6px}
.stat-row{display:flex;align-items:center;gap:8px;font-size:.75rem}
.stat-label{color:var(--silver);min-width:32px}
.stat-bar{flex:1;height:6px;background:var(--slate);border-radius:3px;overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width 1s ease}
.stat-val{color:var(--cyan);font-weight:700;font-family:'Orbitron',sans-serif;font-size:.65rem;min-width:24px;text-align:right}
.card-jutsu{margin-top:10px;padding:8px;background:rgba(78,205,196,0.06);border-radius:8px;font-size:.75rem;color:var(--light)}
.card-jutsu-label{font-size:.6rem;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
/* ===== CARD DETAIL MODAL ===== */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:2000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-card{background:var(--navy);border:2px solid var(--cyan);border-radius:20px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 0 60px var(--cyan-glow)}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--silver);font-size:1.5rem;cursor:pointer;z-index:10}
.modal-close:hover{color:var(--white)}
.modal-hero{height:220px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(78,205,196,0.08),transparent)}
.modal-hero img{max-height:200px;filter:drop-shadow(0 0 30px var(--cyan-glow))}
.modal-body{padding:24px}
.modal-name{font-size:1.8rem;font-weight:900;color:var(--white)}
.modal-name-jp{font-size:.85rem;color:var(--cyan);margin-bottom:4px}
.modal-title-badge{display:inline-block;padding:3px 12px;border-radius:4px;font-size:.7rem;font-weight:700;margin-bottom:16px}
.modal-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.modal-info-item{font-size:.8rem}.modal-info-label{color:var(--silver)}.modal-info-value{color:var(--white);font-weight:700}
.modal-stats{margin-bottom:16px}
.modal-stat-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:.85rem}
.modal-stat-label{color:var(--silver);min-width:48px}
.modal-stat-bar{flex:1;height:8px;background:var(--slate);border-radius:4px;overflow:hidden}
.modal-stat-fill{height:100%;border-radius:4px}
.modal-stat-val{color:var(--white);font-weight:900;font-family:'Orbitron',sans-serif;font-size:.8rem;min-width:28px;text-align:right}
.modal-jutsu-list{margin-bottom:16px}
.modal-jutsu-item{display:flex;gap:8px;padding:8px;background:rgba(78,205,196,0.06);border-radius:8px;margin-bottom:6px;font-size:.8rem;align-items:center}
.modal-jutsu-icon{font-size:1.2rem}
.modal-quote{padding:12px;background:var(--slate);border-radius:10px;border-left:3px solid var(--cyan);font-size:.85rem;color:var(--light);font-style:italic;line-height:1.6}
/* ===== MODAL · VS 随机挑战者 ===== */
.modal-vs-box{margin-top:18px;padding:16px;background:linear-gradient(135deg,rgba(231,76,60,0.12),rgba(243,156,18,0.08));border:2px solid rgba(243,156,18,0.3);border-radius:14px}
.modal-vs-label{font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:900;letter-spacing:3px;color:var(--orange);margin-bottom:12px;text-align:center}
.modal-vs-row{display:flex;align-items:center;gap:14px}
.modal-vs-opp{flex:1;display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(8,12,24,0.5);border-radius:10px}
.modal-vs-opp img{height:48px;width:48px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6))}
.modal-vs-opp-name{font-weight:900;color:var(--white);font-size:.95rem}
.modal-battle-btn{padding:12px 20px;background:linear-gradient(135deg,var(--red),var(--orange));border:none;border-radius:10px;color:#fff;font-family:'Orbitron',sans-serif;font-weight:900;font-size:.9rem;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 16px rgba(231,76,60,0.35);transition:.25s;white-space:nowrap}
.modal-battle-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(231,76,60,0.55)}
.modal-battle-btn:active{transform:translateY(0)}
/* ===== MODAL · iPad 横屏全屏详情页 ===== */
@media (min-width:900px) and (orientation:landscape){
  .modal-overlay{padding:0;background:rgba(0,0,0,0.96)}
  .modal-card{max-width:none;width:100vw;height:100vh;max-height:100vh;border-radius:0;border:none;display:grid;grid-template-columns:1.2fr 1fr;overflow:hidden;box-shadow:none}
  .modal-close{top:28px;right:36px;font-size:2rem;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(0,0,0,0.45);color:var(--white);z-index:20;transition:.2s}
  .modal-close:hover{background:rgba(231,76,60,0.8);transform:scale(1.1)}
  .modal-hero{height:100vh;padding:48px;background:radial-gradient(circle at 50% 55%,rgba(78,205,196,0.12) 0%,rgba(8,12,24,0.98) 70%),var(--bg);border-right:1px solid rgba(78,205,196,0.15);align-items:center}
  .modal-hero img{max-height:92vh;max-width:100%;width:auto;filter:drop-shadow(0 12px 40px rgba(0,0,0,0.75)) drop-shadow(0 0 80px var(--cyan-glow));animation:heroFadeIn .6s ease-out}
  @keyframes heroFadeIn{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
  .modal-body{padding:64px 56px;overflow-y:auto;height:100vh;display:flex;flex-direction:column}
  .modal-name{font-size:3rem;line-height:1.1;letter-spacing:-1px}
  .modal-name-jp{font-size:1.15rem;margin-bottom:14px;letter-spacing:2px}
  .modal-title-badge{font-size:1rem;padding:7px 20px;margin-bottom:32px;align-self:flex-start;border-radius:6px}
  .modal-info{grid-template-columns:1fr 1fr;gap:16px 28px;margin-bottom:32px;padding:20px 0;border-top:1px solid rgba(78,205,196,0.1);border-bottom:1px solid rgba(78,205,196,0.1)}
  .modal-info-item{font-size:1.05rem;display:flex;gap:8px;align-items:baseline}
  .modal-info-label{font-size:.95rem;opacity:.75}
  .modal-info-value{font-size:1.05rem}
  .modal-stats{margin-bottom:32px}
  .modal-stat-row{font-size:1.1rem;margin-bottom:14px;gap:16px}
  .modal-stat-label{min-width:64px;font-size:1rem}
  .modal-stat-bar{height:12px;border-radius:6px}
  .modal-stat-fill{border-radius:6px}
  .modal-stat-val{font-size:1.05rem;min-width:44px}
  .modal-jutsu-list{margin-bottom:28px}
  .modal-jutsu-item{font-size:1.1rem;padding:14px 18px;margin-bottom:10px;border-radius:10px}
  .modal-jutsu-icon{font-size:1.5rem}
  .modal-quote{font-size:1.1rem;padding:20px 22px;line-height:1.75;border-left-width:4px}
  .modal-vs-box{margin-top:24px;padding:22px;border-radius:18px;border-width:3px}
  .modal-vs-label{font-size:.85rem;letter-spacing:4px;margin-bottom:16px}
  .modal-vs-row{gap:18px}
  .modal-vs-opp{padding:12px 18px;gap:14px;border-radius:14px}
  .modal-vs-opp img{height:72px;width:72px}
  .modal-vs-opp-name{font-size:1.15rem}
  .modal-battle-btn{padding:16px 28px;font-size:1.05rem;border-radius:14px}
}
/* ===== JUTSU DETAIL MODAL ===== */
.modal-jutsu-item.jutsu-clickable{cursor:pointer;transition:.25s;position:relative}
.modal-jutsu-item.jutsu-clickable:hover{background:rgba(78,205,196,0.18);transform:translateX(4px)}
.modal-jutsu-arrow{margin-left:auto;color:var(--cyan);font-weight:900;opacity:.6;transition:.25s}
.modal-jutsu-item.jutsu-clickable:hover .modal-jutsu-arrow{opacity:1;transform:translateX(2px)}
.jutsu-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:2500;align-items:center;justify-content:center;padding:20px}
.jutsu-modal-overlay.show{display:flex;animation:fadeUp .35s}
.jutsu-modal-card{background:var(--navy);border:2px solid var(--cyan);border-radius:18px;max-width:580px;width:100%;max-height:90vh;overflow:hidden;position:relative;box-shadow:0 0 80px var(--cyan-glow)}
.jutsu-close{position:absolute;top:14px;right:18px;background:rgba(0,0,0,0.55);border:none;color:var(--white);font-size:1.5rem;width:42px;height:42px;border-radius:50%;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:.25s}
.jutsu-close:hover{background:rgba(231,76,60,0.85);transform:scale(1.1)}
.jutsu-fx{height:180px;position:relative;overflow:hidden;background:#05070f}
.jutsu-fx::before,.jutsu-fx::after{content:'';position:absolute;inset:0;pointer-events:none}
.jutsu-content{padding:28px 26px;max-height:calc(90vh - 180px);overflow-y:auto}
.jutsu-name{font-size:2rem;font-weight:900;color:var(--white);letter-spacing:-1px;line-height:1.1}
.jutsu-jp{font-size:.9rem;color:var(--cyan);margin-bottom:10px;letter-spacing:2px}
.jutsu-tag{display:inline-block;padding:5px 14px;background:rgba(78,205,196,0.15);border:1px solid rgba(78,205,196,0.3);border-radius:8px;font-size:.75rem;color:var(--cyan);letter-spacing:1px;margin-bottom:18px;font-weight:700}
.jutsu-desc{font-size:.95rem;line-height:1.8;color:var(--light);margin-bottom:22px;padding:16px 18px;background:var(--slate);border-radius:12px;border-left:3px solid var(--cyan)}
.jutsu-users-label{font-family:'Orbitron',sans-serif;font-size:.65rem;letter-spacing:3px;color:var(--cyan);margin-bottom:12px}
.jutsu-users{display:flex;gap:10px;flex-wrap:wrap}
.jutsu-user{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 6px;background:rgba(78,205,196,0.08);border:1px solid rgba(78,205,196,0.25);border-radius:24px;font-size:.85rem;color:var(--white);font-weight:700}
.jutsu-user img,.jutsu-user-emoji{height:32px;width:32px;object-fit:contain;border-radius:50%;background:rgba(8,12,24,0.7);display:flex;align-items:center;justify-content:center;font-size:18px}
@keyframes fxRotate{to{transform:rotate(360deg)}}
@keyframes fxPulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:.8;transform:scale(1.12)}}
@keyframes fxFlash{0%,100%{opacity:.3}50%{opacity:.95}}
.fx-blue::before{background:radial-gradient(circle,rgba(0,168,255,0.55) 0%,transparent 70%);animation:fxPulse 2s ease-in-out infinite}
.fx-blue::after{background:conic-gradient(from 0deg,transparent,rgba(78,205,196,0.85) 15%,transparent 30%,transparent 50%,rgba(0,168,255,0.85) 65%,transparent 80%);animation:fxRotate 3s linear infinite}
.fx-orange::before{background:radial-gradient(circle,rgba(243,156,18,0.6) 0%,transparent 70%);animation:fxPulse 1.8s ease-in-out infinite}
.fx-orange::after{background:conic-gradient(from 0deg,transparent,rgba(231,76,60,0.8),rgba(243,156,18,0.95),rgba(231,76,60,0.8),transparent);animation:fxRotate 4s linear infinite}
.fx-red::before{background:radial-gradient(circle,rgba(231,76,60,0.65) 0%,transparent 65%);animation:fxPulse 2s ease-in-out infinite}
.fx-red::after{background:radial-gradient(circle at 50% 50%,#000 22%,transparent 23%,transparent 34%,rgba(231,76,60,0.9) 35%,transparent 42%,transparent 55%,rgba(231,76,60,0.4) 56%,transparent 65%);animation:fxRotate 6s linear infinite}
.fx-purple::before{background:radial-gradient(circle,rgba(142,68,173,0.65) 0%,transparent 70%);animation:fxPulse 2.5s ease-in-out infinite}
.fx-purple::after{background:repeating-radial-gradient(circle at 50% 50%,rgba(142,68,173,0.7) 0px,rgba(142,68,173,0.7) 5px,transparent 5px,transparent 28px);animation:fxRotate 10s linear infinite}
.fx-gold::before{background:radial-gradient(circle,rgba(255,215,0,0.55) 0%,transparent 70%);animation:fxFlash 1.1s ease-in-out infinite}
.fx-gold::after{background:conic-gradient(from 0deg,rgba(255,215,0,0.95),transparent 25%,rgba(255,215,0,0.95) 50%,transparent 75%,rgba(255,215,0,0.95));animation:fxRotate 2.2s linear infinite}
.fx-green::before{background:radial-gradient(circle,rgba(46,204,113,0.55) 0%,transparent 70%);animation:fxPulse 2.2s ease-in-out infinite}
.fx-green::after{background:linear-gradient(45deg,transparent 35%,rgba(46,204,113,0.65) 50%,transparent 65%),linear-gradient(-45deg,transparent 35%,rgba(46,204,113,0.4) 50%,transparent 65%);animation:fxRotate 8s linear infinite}
@media (min-width:900px) and (orientation:landscape){
  .jutsu-modal-card{max-width:720px}
  .jutsu-fx{height:240px}
  .jutsu-content{padding:36px 34px}
  .jutsu-name{font-size:2.4rem}
  .jutsu-jp{font-size:1rem;margin-bottom:14px}
  .jutsu-tag{font-size:.85rem;padding:6px 18px;margin-bottom:24px}
  .jutsu-desc{font-size:1.05rem;padding:18px 22px;line-height:1.8}
  .jutsu-users-label{font-size:.8rem;margin-bottom:16px}
  .jutsu-user{padding:8px 16px 8px 8px;font-size:1rem}
  .jutsu-user img,.jutsu-user-emoji{height:40px;width:40px;font-size:22px}
}
/* ===== BATTLE ===== */
.battle-section{padding:80px 20px;max-width:900px;margin:0 auto}
.battle-arena{display:flex;align-items:stretch;gap:0;margin-bottom:30px}
.battle-fighter{flex:1;text-align:center;padding:30px 16px;background:var(--card-bg);border:2px solid rgba(78,205,196,0.15);cursor:pointer;transition:.3s}
.battle-fighter:first-child{border-radius:16px 0 0 16px}
.battle-fighter:last-child{border-radius:0 16px 16px 0}
.battle-fighter.active{border-color:var(--cyan);background:rgba(78,205,196,0.05)}
.battle-fighter img{height:120px;margin-bottom:10px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5))}
.battle-fighter-name{font-weight:900;color:var(--white);font-size:1rem}
.battle-vs{display:flex;align-items:center;justify-content:center;padding:0 4px;font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:900;color:var(--red);text-shadow:0 0 15px rgba(231,76,60,0.5)}
.battle-compare{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
.battle-row{display:contents}
.battle-bar-l{height:8px;background:var(--slate);border-radius:4px;overflow:hidden;direction:rtl}
.battle-bar-r{height:8px;background:var(--slate);border-radius:4px;overflow:hidden}
.battle-fill-l{height:100%;border-radius:4px;background:var(--cyan)}
.battle-fill-r{height:100%;border-radius:4px;background:var(--orange)}
.battle-label{font-size:.75rem;color:var(--silver);text-align:center;min-width:48px}
.battle-select{margin-bottom:20px}

.rank-name{font-size:1.1rem;font-weight:900;color:var(--white);margin-bottom:3px}
.rank-1 .rank-name{font-size:1.3rem}
.rank-reason{font-size:.8rem;color:var(--silver);line-height:1.4}
/* ===== BUTTON ===== */
.btn{display:inline-block;padding:12px 32px;background:transparent;border:2px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:3px;border-radius:50px;cursor:pointer;transition:.3s;text-transform:uppercase}
.btn:hover{background:var(--cyan);color:var(--bg);box-shadow:0 0 25px var(--cyan-glow)}
/* ===== FOOTER ===== */
footer{text-align:center;padding:30px;background:var(--navy);border-top:1px solid rgba(78,205,196,0.1)}

.footer-text{font-size:.75rem;color:var(--silver)}
/* ===== PARTICLES ===== */
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.particle{position:absolute;width:2px;height:2px;background:var(--cyan);border-radius:50%;animation:floatUp linear infinite;opacity:0}
@keyframes floatUp{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.5}90%{opacity:.5}100%{transform:translateY(-10vh) scale(1);opacity:0}}
/* ===== REVEAL ===== */
.reveal{opacity:0;transform:translateY(30px);transition:.8s cubic-bezier(.4,0,.2,1)}.reveal.visible{opacity:1;transform:none}
/* ===== RESPONSIVE ===== */
@media(max-width:640px){

function findJutsu(str){
  const keys=Object.keys(jutsuLib).sort((a,b)=>b.length-a.length);
  for(const k of keys){if(str.includes(k))return {key:k,data:jutsuLib[k]};}
  return null;
}

// ===== RENDER CARDS =====
function renderCards(){
  const grid=document.getElementById('cardGrid');
  grid.innerHTML=ninjas.map(n=>{
    const r=n.rarity==='S'?'rarity-s':n.rarity==='A'?'rarity-a':'rarity-b';
    const maxStat=Math.max(...Object.values(n.stats));
    const topStats=Object.entries(n.stats).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const statLabels={ninjutsu:'忍',taijutsu:'体',genjutsu:'幻',intelligence:'智',speed:'速',stamina:'耐'};
    const imgHtml=n.img?`<img src="${n.img}" alt="${n.name}">`:`<div style="font-size:72px">${n.emoji||'🥷'}</div>`;
    return `<div class="ninja-card ${r}" onclick="openModal('${n.id}')">
      <div class="card-rarity">${n.rarity}</div>
      <div class="card-img-wrap">${imgHtml}</div>
      <div class="card-body">
        <div class="card-name">${n.name}</div>
        <div class="card-name-jp">${n.nameJp}</div>
        <div class="card-stats">${topStats.map(([k,v])=>`<div class="stat-row"><span class="stat-label">${statLabels[k]}</span><div class="stat-bar"><div class="stat-fill" style="width:${v}%;background:${n.color}"></div></div><span class="stat-val">${v}</span></div>`).join('')}</div>
        <div class="card-jutsu"><div class="card-jutsu-label">招牌忍术</div>${n.jutsu[0]}</div>
      </div>
    </div>`;
  }).join('');
}

    <button class="modal-close" onclick="closeModal()">&times;</button>

    <div class="modal-body">
      <div class="modal-name">${n.name}</div>
      <div class="modal-name-jp">${n.nameJp}</div>
      <div class="modal-title-badge" style="background:${n.color};color:#0a0e1a">${n.title}</div>

        <div class="modal-info-item"><span class="modal-info-label">村落：</span><span class="modal-info-value">${n.village}</span></div>
        <div class="modal-info-item"><span class="modal-info-label">等级：</span><span class="modal-info-value">${n.rank}</span></div>
        <div class="modal-info-item"><span class="modal-info-label">属性：</span><span class="modal-info-value">${n.element}</span></div>
        <div class="modal-info-item"><span class="modal-info-label">稀有度：</span><span class="modal-info-value">${n.rarity}级</span></div>
      </div>
      <div class="modal-stats">${Object.entries(n.stats).map(([k,v])=>`<div class="modal-stat-row"><span class="modal-stat-label">${statLabels[k]}</span><div class="modal-stat-bar"><div class="modal-stat-fill" style="width:${v}%;background:${statColors[k]}"></div></div><span class="modal-stat-val">${v}</span></div>`).join('')}</div>
      <div class="modal-jutsu-list">${n.jutsu.map(j=>{const jd=findJutsu(j);return `<div class="modal-jutsu-item${jd?' jutsu-clickable':''}"${jd?` onclick="openJutsu('${jd.key}')"`:''}>${j}${jd?'<span class="modal-jutsu-arrow">→</span>':''}</div>`;}).join('')}</div>
      <div class="modal-quote">${n.quote}</div>
      <div class="modal-vs-box">
        <div class="modal-vs-label">⚔ 随机挑战者 ⚔</div>

          <div class="modal-vs-opp">${oppImg}<span class="modal-vs-opp-name">${opp.name}</span></div>

        </div>

  document.getElementById('modal').classList.add('show');

}
function closeModal(){document.getElementById('modal').classList.remove('show');document.body.style.overflow=''}
function randomBattleStart(lId,rId){
  document.getElementById('fighterL').value=lId;
  document.getElementById('fighterR').value=rId;
  renderBattle();
  closeModal();
  setTimeout(()=>document.getElementById('battle').scrollIntoView({behavior:'smooth',block:'start'}),250);
}
function openJutsu(key){
  const j=jutsuLib[key];if(!j)return;
  const userList=ninjas.filter(n=>n.jutsu.some(x=>x.includes(key)));
  const userHtml=userList.map(u=>{
    const av=u.img?`<img src="${u.img}" alt="${u.name}">`:`<div class="jutsu-user-emoji">${u.emoji||'🥷'}</div>`;
    return `<div class="jutsu-user">${av}<span>${u.name}</span></div>`;
  }).join('');
  document.getElementById('jutsuModalCard').innerHTML=`
    <button class="jutsu-close" onclick="closeJutsu()">&times;</button>
    <div class="jutsu-fx fx-${j.fx}"></div>
    <div class="jutsu-content">
      <div class="jutsu-name">${key}</div>
      <div class="jutsu-jp">${j.jp}</div>
      <div class="jutsu-tag">${j.type} · ${j.elem}</div>
      <div class="jutsu-desc">${j.desc}</div>
      <div class="jutsu-users-label">⚔ 会使用此忍术的忍者 ⚔</div>
      <div class="jutsu-users">${userHtml}</div>
    </div>`;
  document.getElementById('jutsuModal').classList.add('show');
}
function closeJutsu(){document.getElementById('jutsuModal').classList.remove('show');}

// ===== BATTLE =====
function initBattle(){
  const selL=document.getElementById('fighterL'),selR=document.getElementById('fighterR');
  ninjas.forEach((n,i)=>{selL.add(new Option(n.name,n.id));selR.add(new Option(n.name,n.id))});
  selL.value='kakashi';selR.value='naruto';
  renderBattle();
}
function renderBattle(){
  const lId=document.getElementById('fighterL').value,rId=document.getElementById('fighterR').value;
  const l=ninjas.find(x=>x.id===lId),r=ninjas.find(x=>x.id===rId);
  document.getElementById('battleArena').innerHTML=`
    <div class="battle-fighter active"><img src="${l.img}" alt="${l.name}"><div class="battle-fighter-name">${l.name}</div></div>
    <div class="battle-vs">VS</div>
    <div class="battle-fighter active"><img src="${r.img}" alt="${r.name}"><div class="battle-fighter-name">${r.name}</div></div>`;
  const labels={ninjutsu:'忍术',taijutsu:'体术',genjutsu:'幻术',intelligence:'智力',speed:'速度',stamina:'耐力'};
  let lWins=0,rWins=0;
  Object.keys(labels).forEach(k=>{if(l.stats[k]>r.stats[k])lWins++;else if(r.stats[k]>l.stats[k])rWins++});
  document.getElementById('battleCompare').innerHTML=Object.entries(labels).map(([k,label])=>{
    const lv=l.stats[k],rv=r.stats[k];
    const lWin=lv>rv,rWin=rv>lv;
    return `<div class="battle-bar-l"><div class="battle-fill-l" style="width:${lv}%;${lWin?'box-shadow:0 0 8px var(--cyan)':'opacity:.5'}"></div></div>
      <div class="battle-label">${label}<br><span style="font-family:Orbitron;font-size:.7rem;color:${lWin?'var(--cyan)':rWin?'var(--orange)':'var(--silver)'}">${lv} : ${rv}</span></div>
      <div class="battle-bar-r"><div class="battle-fill-r" style="width:${rv}%;${rWin?'box-shadow:0 0 8px var(--orange)':'opacity:.5'}"></div></div>`;
  }).join('')+`<div style="grid-column:1/-1;text-align:center;margin-top:16px;font-weight:900;font-size:1.1rem;color:var(--white)">${lWins>rWins?'🏆 '+l.name+' 胜出！':rWins>lWins?'🏆 '+r.name+' 胜出！':'⚖️ 势均力敌！'}<br><span style="font-size:.8rem;color:var(--silver)">${lWins} : ${rWins}</span></div>`;
}

// ===== QUIZ =====
let qIdx=0,qScores={};
function initQuiz(){
  qIdx=0;qScores={};ninjas.forEach(n=>qScores[n.id]=0);
  document.getElementById('quizCard').style.display='block';
  document.getElementById('quizResult').classList.remove('show');
  renderQ();
}
function renderQ(){
  const q=quizQs[qIdx];
  document.getElementById('quizProg').innerHTML=quizQs.map((_,i)=>`<div class="quiz-dot${i<qIdx?' done':''}${i===qIdx?' active':''}"></div>`).join('');
  document.getElementById('quizNum').textContent=`${qIdx+1} / ${quizQs.length}`;
  document.getElementById('quizQ').textContent=q.q;
  document.getElementById('quizOpts').innerHTML=q.opts.map((o,i)=>`<div class="quiz-opt" onclick="answerQ(${i})">${o.t}</div>`).join('');
}
function answerQ(i){
  const s=quizQs[qIdx].opts[i].s;
  for(const[k,v]of Object.entries(s))qScores[k]=(qScores[k]||0)+v;
  qIdx++;
  if(qIdx<quizQs.length){renderQ()}else{showQResult()}
}
function showQResult(){
  let mk='kakashi',mv=0;
  for(const[k,v]of Object.entries(qScores)){if(v>mv){mv=v;mk=k}}
  const n=ninjas.find(x=>x.id===mk);
  if(n.img){document.getElementById('rImg').src=n.img;document.getElementById('rImg').style.display='block'}
  else{document.getElementById('rImg').style.display='none'}
  document.getElementById('rName').textContent=n.name;
  document.getElementById('rJp').textContent=n.nameJp;
  document.getElementById('rDesc').textContent=quizResults[mk].desc;
  document.getElementById('quizCard').style.display='none';
  document.getElementById('quizProg').innerHTML='';
  document.getElementById('quizResult').classList.add('show');
}

// ===== RANKING =====
function renderRanking(){
  document.getElementById('rankGrid').innerHTML=rankings.map((r,i)=>{
    const n=ninjas.find(x=>x.id===r.id);

    return `<div class="rank-card${i===0?' rank-1':''}">
      <div class="rank-num">#${i+1}</div>
      ${avHtml}
      <div class="rank-info"><div class="rank-name">${n.name}</div><div class="rank-reason">${r.reason}</div></div>
    </div>`;
  }).join('');
}

// ===== INIT =====
// ===== TRIVIA GAME =====
const triviaPool = [
  {q:'卡卡西的招牌忍术叫什么？',a:'雷切',opts:['螺旋丸','雷切','天照','豪火球']},
  {q:'七代目火影是谁？',a:'漩涡鸣人',opts:['宇智波佐助','旗木卡卡西','漩涡鸣人','纲手']},
  {q:'四代火影的绰号是什么？',a:'黄色闪光',opts:['拷贝忍者','黄色闪光','三忍','影之火影']},
  {q:'鸣人体内封印着几尾？',a:'九尾',opts:['一尾','五尾','七尾','九尾']},
  {q:'宇智波一族的瞳术叫什么？',a:'写轮眼',opts:['白眼','写轮眼','轮回眼','转生眼']},
  {q:'螺旋丸是谁发明的？',a:'波风水门',opts:['自来也','漩涡鸣人','波风水门','大蛇丸']},
  {q:'佐助的哥哥叫什么？',a:'宇智波鼬',opts:['宇智波斑','宇智波带土','宇智波鼬','宇智波止水']},
  {q:'自来也属于"传说中的三忍"，另外两个是谁？',a:'纲手和大蛇丸',opts:['卡卡西和凯','纲手和大蛇丸','鼬和斑','水门和佐助']},
  {q:'六代目火影是谁？',a:'旗木卡卡西',opts:['纲手','旗木卡卡西','志村团藏','波风水门']},
  {q:'我爱罗是哪个村子的风影？',a:'砂隐村',opts:['木叶村','砂隐村','雾隐村','岩隐村']},
  {q:'鸣人最喜欢吃什么？',a:'一乐拉面',opts:['寿司','饭团','一乐拉面','烤肉']},
  {q:'天照是谁的忍术？',a:'宇智波鼬/佐助',opts:['卡卡西','宇智波鼬/佐助','鸣人','斑']},
  {q:'忍者学校毕业后的等级是什么？',a:'下忍',opts:['上忍','中忍','下忍','暗部']},
  {q:'卡卡西总是在看的那本书叫什么？',a:'亲热天堂',opts:['忍术大全','亲热天堂','火影秘笈','木叶日报']},
  {q:'须佐能乎是哪个家族的能力？',a:'宇智波',opts:['日向','千手','宇智波','大筒木']},
  {q:'带土的面具忍术叫什么？',a:'神威',opts:['天照','月读','神威','别天神']},
  {q:'鸣人的师傅（传授仙人模式）是谁？',a:'自来也',opts:['卡卡西','自来也','伊鲁卡','水门']},
  {q:'木叶村的全称是什么？',a:'火之国木叶隐村',opts:['风之国木叶村','火之国木叶隐村','土之国木叶村','水之国木叶隐村']},
  {q:'斑和谁一起创建了木叶村？',a:'千手柱间',opts:['千手扉间','千手柱间','大蛇丸','自来也']},

];

let tIdx=0,tScore=0,tStreak=0,tAnswered=false,tQuestions=[];
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function initTrivia(){
  tQuestions=shuffle(triviaPool).slice(0,15);
  tIdx=0;tScore=0;tStreak=0;tAnswered=false;
  document.getElementById('triviaScore').textContent='0';
  document.getElementById('triviaStreak').textContent='0';
  renderTrivia();
}
function renderTrivia(){
  if(tIdx>=tQuestions.length){showTriviaEnd();return}
  tAnswered=false;
  const q=tQuestions[tIdx];
  const opts=shuffle(q.opts);
  document.getElementById('triviaQ').textContent=`${tIdx+1}/${tQuestions.length}`;
  document.getElementById('triviaCard').innerHTML=`
    <div class="trivia-q">${q.q}</div>
    <div class="trivia-opts">${opts.map((o,i)=>`<div class="trivia-opt" onclick="answerTrivia(this,'${o.replace(/'/g,"\\'")}','${q.a.replace(/'/g,"\\'")}')">${o}</div>`).join('')}</div>
    <div class="trivia-feedback" id="triviaFb"></div>`;
}
function answerTrivia(el,picked,correct){
  if(tAnswered)return;tAnswered=true;
  const opts=el.parentElement.children;
  for(const o of opts){
    o.classList.add('disabled');
    if(o.textContent===correct)o.classList.add('correct');
  }
  if(picked===correct){
    tScore+=10+tStreak*2;tStreak++;
    document.getElementById('triviaFb').innerHTML='<span style="color:var(--green)">✅ 正确！'+(tStreak>1?' 连对×'+tStreak+'！🔥':'')+'</span>';
  }else{
    el.classList.add('wrong');tStreak=0;
    document.getElementById('triviaFb').innerHTML='<span style="color:var(--red)">❌ 答错了！正确答案：'+correct+'</span>';
  }
  document.getElementById('triviaScore').textContent=tScore;
  document.getElementById('triviaStreak').textContent=tStreak;
  setTimeout(()=>{tIdx++;renderTrivia()},1500);
}
function showTriviaEnd(){
  const pct=Math.round(tScore/(tQuestions.length*10)*100);
  const stars=pct>=90?'⭐⭐⭐⭐⭐':pct>=70?'⭐⭐⭐⭐':pct>=50?'⭐⭐⭐':pct>=30?'⭐⭐':'⭐';
  const msg=pct>=90?'火影级！你是真正的火影迷！':pct>=70?'上忍级！知识很扎实！':pct>=50?'中忍级！还不错哦！':pct>=30?'下忍级！继续加油！':'忍者学校生！多看几遍火影吧！';
  document.getElementById('triviaCard').innerHTML=`<div class="trivia-end">
    <div class="trivia-end-label">最终得分</div>
    <div class="trivia-end-score">${tScore}</div>
    <div class="trivia-stars">${stars}</div>
    <div class="trivia-end-msg">${msg}</div>
  </div>`;
}

// ===== SHADOW GUESS GAME =====
let sIdx=0,sScore2=0,sStreak2=0,sBest=0,sAnswered2=false,sOrder=[];
function initShadow(){
  sOrder=shuffle(ninjas.map(n=>n.id));
  sIdx=0;sScore2=0;sStreak2=0;sBest=0;sAnswered2=false;
  document.getElementById('shadowScore').textContent='0';
  document.getElementById('shadowBest').textContent='0';
  renderShadow();
}
function renderShadow(){
  if(sIdx>=sOrder.length){showShadowEnd();return}
  sAnswered2=false;
  const correct=ninjas.find(x=>x.id===sOrder[sIdx]);
  // Pick 2 random wrong answers
  const wrongs=shuffle(ninjas.filter(x=>x.id!==correct.id)).slice(0,2);
  const choices=shuffle([correct,...wrongs]);
  const hint=correct.title.split('·')[0].trim();
  document.getElementById('shadowRound').textContent=`${sIdx+1}/${sOrder.length}`;
  const sImgHtml=correct.img?`<img class="shadow-img hidden" id="shadowImg" src="${correct.img}" alt="?">`:`<div id="shadowImg" class="shadow-img hidden" style="font-size:100px;filter:brightness(0)">${correct.emoji||'🥷'}</div>`;
  document.getElementById('shadowCard').innerHTML=`
    <div class="shadow-img-wrap">${sImgHtml}</div>
    <div class="shadow-hint">提示：${hint}</div>
    <div class="shadow-opts">${choices.map(c=>`<div class="shadow-opt" onclick="answerShadow(this,'${c.id}','${correct.id}')">${c.name}</div>`).join('')}</div>
    <div class="shadow-feedback" id="shadowFb"></div>
    <div class="shadow-streak" id="shadowStreakTxt"></div>`;
}
function answerShadow(el,picked,correctId){
  if(sAnswered2)return;sAnswered2=true;
  document.getElementById('shadowImg').classList.remove('hidden');
  document.getElementById('shadowImg').classList.add('revealed');
  const opts=el.parentElement.children;
  for(const o of opts){
    o.classList.add('disabled');
    if(o.textContent===ninjas.find(x=>x.id===correctId).name)o.classList.add('correct');
  }
  if(picked===correctId){
    sScore2+=10;sStreak2++;if(sStreak2>sBest)sBest=sStreak2;
    document.getElementById('shadowFb').innerHTML='<span style="color:var(--green)">✅ 答对了！</span>';
    document.getElementById('shadowStreakTxt').textContent=sStreak2>1?'🔥 连对 ×'+sStreak2:'';
  }else{
    el.classList.add('wrong');sStreak2=0;
    document.getElementById('shadowFb').innerHTML='<span style="color:var(--red)">❌ 是 '+ninjas.find(x=>x.id===correctId).name+'！</span>';
    document.getElementById('shadowStreakTxt').textContent='';
  }
  document.getElementById('shadowScore').textContent=sScore2;
  document.getElementById('shadowBest').textContent=sBest;
  setTimeout(()=>{sIdx++;renderShadow()},1800);
}
function showShadowEnd(){
  const pct=Math.round(sScore2/(sOrder.length*10)*100);
  const msg=pct>=90?'👁️ 写轮眼级！你一眼就能认出所有人！':pct>=70?'🥷 暗部级！识别能力很强！':pct>=50?'🎯 不错！大部分都猜到了！':'💪 继续练习，多看看角色图鉴！';
  document.getElementById('shadowCard').innerHTML=`<div class="trivia-end">
    <div class="trivia-end-label">识别得分</div>
    <div class="trivia-end-score">${sScore2}/${sOrder.length*10}</div>
    <div style="font-size:1.5rem;margin:12px 0">最高连对：${sBest}</div>
    <div class="trivia-end-msg">${msg}</div>
  </div>`;
}

renderCards();initBattle();initTrivia();initShadow();initQuiz();renderRanking();
</script>
