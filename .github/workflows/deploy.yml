name: 部署主站和茶站到阿里云OSS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 ossutil
        run: |
          wget -q https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64 -O ossutil
          chmod +x ossutil
          sudo mv ossutil /usr/local/bin/ossutil

      - name: 配置 ossutil
        run: |
          ossutil config \
            -e oss-cn-hongkong.aliyuncs.com \
            -i "${{ secrets.OSS_ACCESS_KEY_ID }}" \
            -k "${{ secrets.OSS_ACCESS_KEY_SECRET }}"

      - name: 部署主站
        run: |
          ossutil cp index.html oss://yiyeguizhen-web-hk/index.html \
            --meta "Cache-Control:no-cache, no-store, must-revalidate" -f

      - name: 部署茶站
        run: |
          ossutil cp tea/index.html oss://yiyeguizhen-web-hk/tea/index.html \
            --meta "Cache-Control:no-cache, no-store, must-revalidate" -f

      - name: 部署公安备案徽章图片
        run: |
          ossutil cp huizhang.jpeg oss://yiyeguizhen-web-hk/huizhang.jpeg -f
          ossutil cp huizhang.jpeg oss://yiyeguizhen-web-hk/tea/huizhang.jpeg -f

      - name: 部署解酒产品数据库（jp站）
        run: |
          ossutil cp jp/index.html oss://yiyeguizhen-web-hk/jp/index.html \
            --meta "Cache-Control:no-cache, no-store, must-revalidate" -f

      - name: 上传产品图片（jp/img/）
        run: |
          if [ -d "jp/img" ] && [ "$(ls -A jp/img/*.jpg 2>/dev/null)" ]; then
            ossutil cp jp/img/ oss://yiyeguizhen-web-hk/jp/img/ \
              --meta "Cache-Control:public, max-age=604800" \
              --include "*.jpg" -r -f
            echo "✅ 图片上传完成"
          else
            echo "⚠️  jp/img/ 目录为空，跳过"
          fi

      - name: 部署樊文花提案页面
        run: |
          ossutil cp flh/index.html oss://yiyeguizhen-web-hk/flh/index.html \
            --meta "Cache-Control:no-cache, no-store, must-revalidate" \
            --meta "Content-Type:text/html; charset=utf-8" -f

      - name: 上传提案配图
        run: |
          ossutil cp imgs/xka-products.png oss://yiyeguizhen-web-hk/imgs/xka-products.png \
            --meta "Cache-Control:public, max-age=604800" -f
          ossutil cp imgs/wananmima-product.jpg oss://yiyeguizhen-web-hk/imgs/wananmima-product.jpg \
            --meta "Cache-Control:public, max-age=604800" -f
